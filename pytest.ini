[pytest]

asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests for individual components
    integration: Integration tests across services
    failure_mode: Failure mode and edge case tests
    rabbit: RabbitMQ consumer tests
    idempotency: Idempotency tests
    intervals: Interval overlap tests
    booking_lifecycle: Booking lifecycle flow tests
    slow: Slow running tests
    asyncio: Async tests

addopts = 
    --strict-markers
    -v
